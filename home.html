<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <title>Analisador Lexico</title>
</head>
<body>

    <header>
        <h1>analisador lexico</h1>
        <p>automato finito deterministico</p>
    </header>

    <main>

        <section id="controls">
            <div id="insert-box">
                <label for="insert-input">inserir palavras</label>
                <div class="input-row">
                    <input id="insert-input" type="text" placeholder="digite e pressione enter">
                    <button id="insert-button">adicionar</button>
                </div>
            </div>

            <div id="search-box">
                <label for="search-input">buscar palavras</label>
                <input id="search-input" type="text" placeholder="digite para buscar">
            </div>
        </section>

        <section id="word-list-section">
            <span class="section-label">palavras inseridas:</span>
            <div id="word-list"></div>
        </section>

        <section id="table-section">
            <table id="lexical-table">
                <thead id="table-head">
                    <tr>
                        <th id="th-delta">&delta;</th>
                        <th>a</th>
                        <th>b</th>
                        <th>c</th>
                        <th>d</th>
                        <th>e</th>
                        <th>f</th>
                        <th>g</th>
                        <th>h</th>
                        <th>i</th>
                        <th>j</th>
                        <th>k</th>
                        <th>l</th>
                        <th>m</th>
                        <th>n</th>
                        <th>o</th>
                        <th>p</th>
                        <th>q</th>
                        <th>r</th>
                        <th>s</th>
                        <th>t</th>
                        <th>u</th>
                        <th>v</th>
                        <th>w</th>
                        <th>x</th>
                        <th>y</th>
                        <th>z</th>
                    </tr>
                </thead>

                <tbody id="table-body">
                </tbody>
            </table>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
